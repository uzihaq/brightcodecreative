<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrightCode Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080808;--surface:#111;--surface2:#1a1a1a;--border:#222;--border2:#333;--gold:#C4943D;--gold-hover:#d4a44d;--text:#e0e0e0;--text-dim:#888;--text-dark:#080808;--success:#4caf50;--error:#e05555;--radius:8px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.5}
h1,h2,h3{font-family:'Playfair Display',serif;font-weight:600}

/* Layout */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:22px;color:var(--gold)}
.header-actions{display:flex;gap:12px;align-items:center}
.container{max-width:1200px;margin:0 auto;padding:24px}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tab{padding:12px 24px;cursor:pointer;color:var(--text-dim);font-weight:500;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Form */
.section-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.section-group h3{font-size:18px;color:var(--gold);margin-bottom:16px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:4px;font-weight:500}
.field input,.field textarea{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;resize:vertical}
.field input:focus,.field textarea:focus{border-color:var(--gold)}
.field textarea{min-height:80px}

/* Buttons */
.btn{padding:10px 20px;border:none;border-radius:6px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.btn-gold{background:var(--gold);color:var(--text-dark)}
.btn-gold:hover{background:var(--gold-hover)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text-dim)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm{padding:6px 14px;font-size:13px}

/* Project cards */
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.project-card:hover{border-color:var(--border2)}
.project-card img{width:100%;height:180px;object-fit:cover}
.project-card-body{padding:16px}
.project-card-body h4{font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;margin-bottom:4px}
.project-card-body p{font-size:13px;color:var(--text-dim);margin-bottom:12px}

/* Edit panel */
.edit-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-top:20px;display:none}
.edit-panel.open{display:block}
.edit-panel h3{font-size:18px;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px}
.edit-grid .full{grid-column:1/-1}
.upload-area{border:2px dashed var(--border2);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:border-color .2s;margin-top:8px}
.upload-area:hover{border-color:var(--gold)}
.upload-area input{display:none}
.upload-preview{max-width:200px;max-height:120px;border-radius:6px;margin-top:8px}

/* Stats editor */
.stat-row{display:flex;gap:12px;align-items:center;margin-bottom:8px}
.stat-row input{flex:1}

/* Array editor */
.array-items{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.array-item{background:var(--surface2);border:1px solid var(--border2);border-radius:16px;padding:4px 12px;font-size:13px;display:flex;align-items:center;gap:6px}
.array-item .remove{cursor:pointer;color:var(--error);font-weight:bold;font-size:16px;line-height:1}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 24px;border-radius:var(--radius);font-size:14px;font-weight:500;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s ease}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--success);color:#fff}
.toast.error{background:var(--error);color:#fff}

/* Category editor inline */
.category-row{display:grid;grid-template-columns:auto 1fr 1fr 1fr auto;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.category-row:last-child{border-bottom:none}
.category-row label{font-size:12px;color:var(--text-dim)}

/* Responsive */
@media(max-width:768px){
  .header{padding:12px 16px;flex-direction:column;gap:8px}
  .container{padding:16px}
  .edit-grid{grid-template-columns:1fr}
  .project-grid{grid-template-columns:1fr}
  .tabs{overflow-x:auto}
  .tab{white-space:nowrap;padding:10px 16px;font-size:14px}
  .category-row{grid-template-columns:1fr 1fr;gap:4px}
}
</style>
</head>
<body>

<div class="header">
  <h1>BrightCode Editor</h1>
  <div class="header-actions">
    <span id="status" style="font-size:13px;color:var(--text-dim)"></span>
    <button class="btn btn-gold" onclick="deployToProduction()" id="deploy-btn" style="font-size:13px;padding:8px 20px;white-space:nowrap">🚀 Publish to Production</button>
  </div>
</div>

<div class="container">
  <div class="tabs">
    <div class="tab active" data-tab="content">Site Text</div>
    <div class="tab" data-tab="projects">Projects</div>
  </div>

  <!-- SITE TEXT TAB -->
  <div class="tab-content active" id="tab-content">
    <div id="content-form"></div>
    <div style="margin-top:20px;text-align:right">
      <button class="btn btn-gold" onclick="saveContent()">Save Site Text</button>
    </div>
  </div>

  <!-- PROJECTS TAB -->
  <div class="tab-content" id="tab-projects">
    <div class="project-grid" id="project-grid"></div>
    <div id="edit-panel-container"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let contentData = {};
let projectsData = { categories: [], allProjects: [] };
let editingProject = null;

// ── Tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ── Toast ──
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Content Sections Config ──
const contentSections = {
  'Hero': ['heroTagline','heroHeadlinePre','heroHeadlineAccent','heroHeadlinePost','heroDescription','heroButtonText','scrollIndicatorText'],
  'Navigation': ['navCtaText'],
  'Logo': ['logoInitials','logoName','logoSubtitle'],
  'About': ['aboutLabel','aboutHeadingPre','aboutHeadingAccent','aboutDescription1','aboutDescription2'],
  'Contact': ['contactLabel','contactHeadingPre','contactHeadingAccent','contactDescription','contactCtaText','contactEmail'],
  'Footer': ['footerCopyright'],
  'Project Page': ['backButtonText','playVideoText','galleryTitle','viewAllText'],
};

const longFields = new Set(['heroDescription','aboutDescription1','aboutDescription2','contactDescription','footerCopyright']);

function renderContentForm() {
  let html = '';

  // Standard text sections
  for (const [section, fields] of Object.entries(contentSections)) {
    html += `<div class="section-group"><h3>${section}</h3>`;
    for (const key of fields) {
      const val = contentData[key] || '';
      const tag = longFields.has(key) ? 'textarea' : 'input';
      html += `<div class="field"><label>${key}</label><${tag} id="c_${key}" ${tag === 'input' ? 'type="text"' : ''} data-key="${key}">${tag === 'textarea' ? esc(val) : ''}</${tag === 'textarea' ? 'textarea' : ''}`;
      if (tag === 'input') html = html.slice(0, -1) + ` value="${esc(val)}">`;
      html += `</div>`;
    }
    html += `</div>`;
  }

  // Nav Section Labels
  html += `<div class="section-group"><h3>Navigation Section Labels</h3>`;
  html += `<div id="navLabels">`;
  (contentData.navSectionLabels || []).forEach((label, i) => {
    html += `<div class="field"><label>Section ${i}</label><input type="text" data-navlabel="${i}" value="${esc(label)}"></div>`;
  });
  html += `</div></div>`;

  // Nav Links
  html += `<div class="section-group"><h3>Navigation Links</h3>`;
  (contentData.navLinks || []).forEach((link, i) => {
    html += `<div style="display:flex;gap:12px;margin-bottom:8px">`;
    html += `<div class="field" style="flex:1"><label>Label</label><input type="text" data-navlink="${i}" data-prop="label" value="${esc(link.label)}"></div>`;
    html += `<div class="field" style="width:100px"><label>Section #</label><input type="number" data-navlink="${i}" data-prop="sectionIndex" value="${link.sectionIndex}"></div>`;
    html += `</div>`;
  });
  html += `</div>`;

  // About Stats
  html += `<div class="section-group"><h3>About Stats</h3><div id="statsEditor">`;
  (contentData.aboutStats || []).forEach((stat, i) => {
    html += `<div class="stat-row"><input type="text" data-stat="${i}" data-prop="number" value="${esc(stat.number)}" placeholder="Number"><input type="text" data-stat="${i}" data-prop="label" value="${esc(stat.label)}" placeholder="Label"></div>`;
  });
  html += `</div></div>`;

  // Footer Socials
  html += `<div class="section-group"><h3>Footer Socials</h3>`;
  html += `<div class="array-items" id="socialsArray">`;
  (contentData.footerSocials || []).forEach((s, i) => {
    html += `<span class="array-item">${esc(s)} <span class="remove" onclick="removeSocial(${i})">&times;</span></span>`;
  });
  html += `</div>`;
  html += `<div style="display:flex;gap:8px"><input type="text" id="newSocial" placeholder="Add social..." style="flex:1;padding:8px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:14px;outline:none"><button class="btn btn-outline btn-sm" onclick="addSocial()">Add</button></div>`;
  html += `</div>`;

  // Project Detail Labels
  html += `<div class="section-group"><h3>Project Detail Labels</h3>`;
  for (const [k, v] of Object.entries(contentData.projectDetailLabels || {})) {
    html += `<div class="field"><label>${k}</label><input type="text" data-pdl="${k}" value="${esc(v)}"></div>`;
  }
  html += `</div>`;

  // Media Type Badges
  html += `<div class="section-group"><h3>Media Type Badges</h3>`;
  for (const [k, v] of Object.entries(contentData.mediaTypeBadges || {})) {
    html += `<div class="field"><label>${k}</label><input type="text" data-mtb="${k}" value="${esc(v)}"></div>`;
  }
  html += `</div>`;

  // Gallery Item Labels
  html += `<div class="section-group"><h3>Gallery Item Labels</h3>`;
  for (const [k, v] of Object.entries(contentData.galleryItemLabels || {})) {
    html += `<div class="field"><label>${k}</label><input type="text" data-gil="${k}" value="${esc(v)}"></div>`;
  }
  html += `</div>`;

  document.getElementById('content-form').innerHTML = html;
}

function gatherContent() {
  // Simple fields
  for (const fields of Object.values(contentSections)) {
    for (const key of fields) {
      const el = document.querySelector(`[data-key="${key}"]`);
      if (el) contentData[key] = el.value;
    }
  }
  // Nav section labels
  contentData.navSectionLabels = [];
  document.querySelectorAll('[data-navlabel]').forEach(el => {
    contentData.navSectionLabels[parseInt(el.dataset.navlabel)] = el.value;
  });
  // Nav links
  const navMap = {};
  document.querySelectorAll('[data-navlink]').forEach(el => {
    const i = parseInt(el.dataset.navlink);
    if (!navMap[i]) navMap[i] = {};
    navMap[i][el.dataset.prop] = el.dataset.prop === 'sectionIndex' ? parseInt(el.value) : el.value;
  });
  contentData.navLinks = Object.values(navMap);
  // Stats
  const statMap = {};
  document.querySelectorAll('[data-stat]').forEach(el => {
    const i = parseInt(el.dataset.stat);
    if (!statMap[i]) statMap[i] = {};
    statMap[i][el.dataset.prop] = el.value;
  });
  contentData.aboutStats = Object.values(statMap);
  // Project detail labels
  document.querySelectorAll('[data-pdl]').forEach(el => {
    contentData.projectDetailLabels[el.dataset.pdl] = el.value;
  });
  // Media type badges
  document.querySelectorAll('[data-mtb]').forEach(el => {
    contentData.mediaTypeBadges[el.dataset.mtb] = el.value;
  });
  // Gallery item labels
  document.querySelectorAll('[data-gil]').forEach(el => {
    contentData.galleryItemLabels[el.dataset.gil] = el.value;
  });
}

function removeSocial(i) {
  contentData.footerSocials.splice(i, 1);
  renderContentForm();
}

function addSocial() {
  const input = document.getElementById('newSocial');
  const val = input.value.trim();
  if (!val) return;
  contentData.footerSocials.push(val);
  renderContentForm();
}

async function saveContent() {
  gatherContent();
  try {
    const res = await fetch('/api/content', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(contentData) });
    const data = await res.json();
    if (data.ok) toast('Site text saved!', 'success');
    else toast('Save failed: ' + (data.error || 'Unknown error'), 'error');
  } catch (err) {
    toast('Save failed: ' + err.message, 'error');
  }
}

// ── Projects ──
function renderProjects() {
  const grid = document.getElementById('project-grid');
  let html = '';
  for (const p of projectsData.allProjects) {
    html += `<div class="project-card">
      <img src="/images/${p.image}.jpg" alt="${esc(p.title)}" onerror="this.style.background='var(--surface2)';this.style.height='180px'">
      <div class="project-card-body">
        <h4>${esc(p.title)}</h4>
        <p>${esc(p.desc)}</p>
        <button class="btn btn-outline btn-sm" onclick="openEditPanel('${p.id}')">Edit</button>
      </div>
    </div>`;
  }
  grid.innerHTML = html;
}

function openEditPanel(id) {
  editingProject = id;
  const p = projectsData.allProjects.find(x => x.id === id);
  if (!p) return;

  const fields = [
    { key: 'title', label: 'Title' },
    { key: 'desc', label: 'Description' },
    { key: 'longDesc', label: 'Long Description', full: true, long: true },
    { key: 'client', label: 'Client' },
    { key: 'role', label: 'Role' },
    { key: 'tools', label: 'Tools' },
    { key: 'deliverables', label: 'Deliverables' },
    { key: 'year', label: 'Year' },
    { key: 'type', label: 'Type (video/image)' },
    { key: 'color', label: 'Color (hex)' },
    { key: 'vimeoId', label: 'Vimeo ID' },
    { key: 'imageFocus', label: 'Image Focus (CSS position)' },
  ];

  let html = `<div class="edit-panel open" id="edit-panel">
    <h3>Editing: ${esc(p.title)} <button class="btn btn-outline btn-sm" onclick="closeEditPanel()">Close</button></h3>
    <div class="edit-grid">`;

  for (const f of fields) {
    const val = p[f.key] || '';
    const cls = f.full ? ' full' : '';
    if (f.long) {
      html += `<div class="field${cls}"><label>${f.label}</label><textarea data-pfield="${f.key}">${esc(val)}</textarea></div>`;
    } else {
      html += `<div class="field${cls}"><label>${f.label}</label><input type="text" data-pfield="${f.key}" value="${esc(val)}"></div>`;
    }
  }

  html += `<div class="field full"><label>Project Image</label>
    <div class="upload-area" onclick="document.getElementById('imageInput').click()">
      <p style="color:var(--text-dim)">Click to upload new image</p>
      <input type="file" id="imageInput" accept="image/*" onchange="uploadImage('${p.id}')">
      <img class="upload-preview" id="uploadPreview" src="/images/${p.image}.jpg" alt="Current">
    </div>
  </div>`;

  html += `</div>
    <div style="margin-top:16px;display:flex;gap:12px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeEditPanel()">Cancel</button>
      <button class="btn btn-gold" onclick="saveProject()">Save Project</button>
    </div>
  </div>`;

  document.getElementById('edit-panel-container').innerHTML = html;
  document.getElementById('edit-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeEditPanel() {
  editingProject = null;
  document.getElementById('edit-panel-container').innerHTML = '';
}

function gatherProject() {
  const p = projectsData.allProjects.find(x => x.id === editingProject);
  if (!p) return null;
  document.querySelectorAll('[data-pfield]').forEach(el => {
    p[el.dataset.pfield] = el.value;
  });
  return p;
}

async function saveProject() {
  gatherProject();
  try {
    const res = await fetch('/api/projects', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(projectsData) });
    const data = await res.json();
    if (data.ok) {
      toast('Project saved!', 'success');
      renderProjects();
    } else {
      toast('Save failed: ' + (data.error || 'Unknown error'), 'error');
    }
  } catch (err) {
    toast('Save failed: ' + err.message, 'error');
  }
}

async function uploadImage(projectId) {
  const input = document.getElementById('imageInput');
  if (!input.files.length) return;
  const fd = new FormData();
  fd.append('image', input.files[0]);
  fd.append('projectId', projectId);
  try {
    const res = await fetch('/api/upload-image', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.ok) {
      toast('Image uploaded!', 'success');
      const preview = document.getElementById('uploadPreview');
      if (preview) preview.src = `/images/${projectId}.jpg?t=${Date.now()}`;
      // Also refresh project cards
      renderProjects();
    } else {
      toast('Upload failed: ' + (data.error || 'Unknown error'), 'error');
    }
  } catch (err) {
    toast('Upload failed: ' + err.message, 'error');
  }
}

// ── Helpers ──
async function deployToProduction() {
  const btn = document.getElementById('deploy-btn');
  const oldText = btn.textContent;
  btn.textContent = '⏳ Publishing...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/deploy', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      toast(data.message, 'success');
    } else {
      toast('Deploy failed: ' + (data.error || 'Unknown error'), 'error');
    }
  } catch (err) {
    toast('Deploy failed: ' + err.message, 'error');
  } finally {
    btn.textContent = oldText;
    btn.disabled = false;
  }
}

function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
async function init() {
  try {
    const [contentRes, projectsRes] = await Promise.all([
      fetch('/api/content'),
      fetch('/api/projects'),
    ]);
    if (contentRes.status === 401 || projectsRes.status === 401) {
      location.href = '/login.html';
      return;
    }
    contentData = await contentRes.json();
    projectsData = await projectsRes.json();
    renderContentForm();
    renderProjects();
    document.getElementById('status').textContent = 'Connected';
  } catch (err) {
    document.getElementById('status').textContent = 'Connection error';
    toast('Failed to load data: ' + err.message, 'error');
  }
}

init();
</script>
</body>
</html>
